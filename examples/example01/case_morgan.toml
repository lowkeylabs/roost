case_name = "morgan"
description = "Morgan is a 54-year-old single professional who retired in early 2026. Morgan has built moderate savings across taxable, tax-deferred, and Roth accounts. With 11 years until Medicare (age 65), Morgan must obtain health insurance through the ACA marketplace. This case highlights Owl's ACA marketplace modeling: the optimizer accounts for Premium Tax Credits when MAGI falls within subsidy-eligible ranges (roughly 100%–400% of federal poverty level) and adjusts Roth conversion and withdrawal timing accordingly.\n\nKey features: pre-65 ACA costs with SLCSP benchmark premium, subsidy-aware income optimization, and the trade-off between Roth conversions (higher MAGI, lower ACA subsidy) versus tax-deferred withdrawals.\n"

