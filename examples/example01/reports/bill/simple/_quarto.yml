project:
  type: default

execute:
  echo: false
  env:
    REPORT_FORMAT: html

format:
  html:
    toc: true
    toc-depth: 2
    number-sections: true
    theme: cosmo
    code-fold: true
    embed-resources: true
    execute:
      env:
        REPORT_FORMAT: html

  pdf:
    documentclass: article
    classoption: ["11pt"]
    geometry: margin=1in
    toc: true
    number-sections: true
    colorlinks: true
    linkcolor: black
    urlcolor: blue
    execute:
      env:
        REPORT_FORMAT: pdf

    include-in-header:
      - text: |
          \usepackage{booktabs}
          \usepackage{longtable}
          \usepackage{array}
          \usepackage{adjustbox}
          \usepackage{caption}
          \usepackage{titlesec}
          \usepackage{fancyhdr}
          \usepackage[table]{xcolor}
          \usepackage{ragged2e}
          \usepackage{lmodern}

          % Section styling
          \titleformat{\section}{\large\bfseries}{\thesection}{1em}{}
          \titleformat{\subsection}{\normalsize\bfseries}{\thesubsection}{1em}{}

          % Header / footer
          \pagestyle{fancy}
          \fancyhead[L]{OWL-ROOST}
          \fancyhead[R]{Retirement Report}
          \fancyfoot[C]{\thepage}

          % Table spacing
          \renewcommand{\arraystretch}{1.2}
          \setlength{\tabcolsep}{6pt}
          \captionsetup{skip=6pt}

          % Improve wrapping
          \hyphenpenalty=10000
          \exhyphenpenalty=10000
          \sloppy

          % Zebra striping
          \rowcolors{2}{gray!5}{white}
