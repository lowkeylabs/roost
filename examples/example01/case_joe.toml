case_name = "joe"
description = "Joe is a single professional in his late fifties, planning to retire in a few years.  He's built a solid nest egg across taxable, tax-deferred, and Roth accounts—and has been contributing to an HSA while on a high-deductible health plan. He also owns a rental property he plans to sell when he retires to simplify his life and fund his early retirement years.\n\nThis case demonstrates Owl's handling of a single retiree: HSA accounts (with contributions stopping at Medicare), fixed assets (real estate disposition with capital gains), and the full optimization of Roth conversions and withdrawal sequencing. Run with different rate assumptions to see how sequence-of-returns risk affects the optimal strategy.\n"

